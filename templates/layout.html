<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Walk-Up Song Finder{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #181818;
      border: 1px solid #282828;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
    }

    .eyebrow {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #1DB954;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 1rem;
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    p {
      color: #b3b3b3;
      font-size: 0.95rem;
      line-height: 1.65;
      margin-bottom: 1.5rem;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 0.9rem 1.5rem;
      background: #1DB954;
      color: #000;
      border: none;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:hover { background: #1ed760; transform: scale(1.01); }
    .btn:active { transform: scale(0.99); }

    .btn-ghost {
      background: transparent;
      color: #b3b3b3;
      border: 1px solid #333;
      margin-top: 0.75rem;
    }
    .btn-ghost:hover { background: #222; color: #f0f0f0; transform: none; }

    .divider {
      border: none;
      border-top: 1px solid #282828;
      margin: 1.5rem 0;
    }

    .error-msg {
      background: #2a1a1a;
      border: 1px solid #5a2a2a;
      color: #ff6b6b;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #444;
      text-align: center;
    }
  </style>
  {% block extra_styles %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}
  <footer>Walk-Up Song Finder - powered by Spotify</footer>
</body>
</html>
